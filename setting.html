<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการทรัพย์สินคอมพิวเตอร์ - ตั้งค่า</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-50">
    <!-- Navigation -->
    <nav class="bg-white shadow-md">
        <div class="container mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <div class="flex-shrink-0">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                        </svg>
                    </div>
                    <div class="ml-4 text-xl font-bold text-gray-800">ระบบจัดการทรัพย์สินคอมพิวเตอร์</div>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="dashboard.html" class="px-4 py-2 text-sm font-medium text-gray-600 hover:text-blue-700 hover:bg-blue-50 rounded-lg transition-all duration-300 ease-in-out">แดชบอร์ด</a>
                    <a href="management.html" class="px-4 py-2 text-sm font-medium text-gray-600 hover:text-blue-700 hover:bg-blue-50 rounded-lg transition-all duration-300 ease-in-out">จัดการอุปกรณ์</a>
                    <a href="upload.html" class="px-4 py-2 text-sm font-medium text-gray-600 hover:text-blue-700 hover:bg-blue-50 rounded-lg transition-all duration-300 ease-in-out">นำเข้าข้อมูล</a>
                    <a href="setting.html" class="px-4 py-2 text-sm font-semibold text-blue-800 bg-blue-100 rounded-lg shadow-sm transition-all duration-300 ease-in-out">ตั้งค่า</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Settings Content -->
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-indigo-800 mb-6">ตั้งค่า</h1>
        <form class="bg-white p-6 rounded-xl shadow-md space-y-6">
            <div>
                <label for="orgName" class="block text-sm font-medium text-gray-700 mb-1">ชื่อองค์กร</label>
                <input type="text" id="orgName" name="orgName" placeholder="ระบุชื่อองค์กร" class="w-full border-gray-300 rounded-lg focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            <div class="flex items-center">
                <input type="checkbox" id="darkMode" name="darkMode" class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded">
                <label for="darkMode" class="ml-2 block text-sm text-gray-700">เปิดโหมดมืด</label>
            </div>
            <div>
                <button type="submit" class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition">บันทึก</button>
            </div>
        </form>
    </div>
</body>
</html>
